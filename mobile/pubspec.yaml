name: banten_explorer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  speech_to_text: ^7.3.0
  dio: ^5.4.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  provider: ^6.1.1
  url_launcher: ^6.3.2
  carousel_slider: ^5.0.0
  lottie: ^3.1.2
  flutter_tts: ^3.8.5
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logodinpar.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
      - assets/loading-animation.json
      - assets/speaker.svg
      - assets/logodinpar.jpg
      - assets/bg1.jpg
      - assets/blank_splash.jpg